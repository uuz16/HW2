name: Deploy to Local Windows Runner

# CI/CD 워크플로우(빌드 및 푸시)가 성공적으로 완료되었을 때 실행됩니다.
on:
  workflow_run:
    workflows: ["CI/CD to Docker Hub"]  # 이전에 생성한 ci.yml의 name과 일치해야 합니다.
    types:
      - completed

env:
  IMAGE_NAME: uuz16/news_analyzer:latest
  CONTAINER_NAME: news_analyzer_container

jobs:
  deploy:
    # 이전 빌드 워크플로우가 '성공'했을 때만 이 배포 작업을 실행합니다.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    # 내 컴퓨터에 등록된 self-hosted runner를 사용하도록 지정합니다.
    runs-on: self-hosted
    
    steps:
      # (옵션) 이미지가 Private 리포지토리라면 Docker Hub 로그인이 필요합니다.
      # Public이라면 이 단계를 생략해도 괜찮지만 안전을 위해 포함합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest Docker image
        run: docker pull ${{ env.IMAGE_NAME }}

      # 기존에 실행중인 컨테이너가 있으면 중지합니다.
      # 처음 실행 시 컨테이너가 없어서 발생하는 에러를 무시하기 위해 continue-on-error를 true로 설정합니다.
      - name: Stop existing container
        run: docker stop ${{ env.CONTAINER_NAME }}
        continue-on-error: true

      # 기존 컨테이너를 삭제합니다.
      - name: Remove existing container
        run: docker rm ${{ env.CONTAINER_NAME }}
        continue-on-error: true

      # 최신 이미지로 새로운 컨테이너를 백그라운드(-d)에서 포트 8000으로 실행합니다.
      - name: Run new container
        run: docker run -d --name ${{ env.CONTAINER_NAME }} -p 8000:8000 ${{ env.IMAGE_NAME }}
